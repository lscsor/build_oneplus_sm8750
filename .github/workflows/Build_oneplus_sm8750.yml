name: Build_oneplus_sm8750
permissions:
  contents: read
  actions: write
on:
  workflow_dispatch:
    inputs:
      enable_release:
        description: "发布到 Releases"
        required: true
        default: true
        type: boolean

      device_name:
        description: "📝请选择要编译的机型："
        required: true
        type: choice
        options:
          - 'oneplus_13'
          - 'oneplus_ace5_pro'
          - 'oneplus_ace_6'
          - 'oneplus_13t'
          - 'oneplus_pad_2'
          - 'oneplus_pad_2_pro'
          - 'oneplus_ace5_ultra'
          - 'realme_GT7'
          - 'realme_GT7pro'
          - 'realme_GT7pro_Speed'
          - 'realme_GT8'
        default: 'oneplus_ace5_pro'

      custom_kernel_suffix:
        description: "✏️ 自定义内核名称- (-开头 留空则默认官方）"
        required: false
        default: ''
      
      custom_kernel_time:
        description: "⏰ 自定义构建时间- (英文时间字符串格式 留空则默认官方）"
        required: false
        default: ''

      enable_susfs:
        description: "启用SUSFS"
        required: true
        default: true
        type: boolean
      
      enable_droidspaces:
        description: "添加 Droidspaces 容器支持"
        required: true
        default: false
        type: boolean
        
      enable_ReKernel:
        description: "添加Re-Kernel支持"
        required: true
        default: false
        type: boolean

      enable_Adios:
        description: "添加ADIOS IO调度器支持"
        required: true
        default: true
        type: boolean
      
      enable_scx:
        description: "添加完美风驰"
        required: true
        default: true
        type: boolean

      enable_bbg:
        description: "添加BBG基带守护"
        required: true
        default: true
        type: boolean


jobs:
  build:
    name: Build_${{ github.event.inputs.device_name }}
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      DEVICES_NAME:           ${{ github.event.inputs.device_name }}
      CUSTOM_KERNEL_SUFFIX:   ${{ github.event.inputs.custom_kernel_suffix }}
      CUSTOM_KERNEL_TIME:     ${{ github.event.inputs.custom_kernel_time }}
      ENABLE_SUSFS:           ${{ github.event.inputs.enable_susfs }}
      ENABLE_DROIDSPACES:     ${{ github.event.inputs.enable_droidspaces }}
      ENABLE_REKERNEL:        ${{ github.event.inputs.enable_ReKernel }}
      ENABLE_ADIOS:           ${{ github.event.inputs.enable_Adios }}
      ENABLE_SCX:             ${{ github.event.inputs.enable_scx }}
      ENABLE_BBG:             ${{ github.event.inputs.enable_bbg }}
    outputs:
      ksuver: ${{ steps.ksu_step.outputs.ksuver }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: ⚙️ Set REPO_MANIFEST (设置对应机型配置文件)
        run: |
          case "${{ env.DEVICES_NAME }}" in
            oneplus_ace5_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_ace5_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_pro_b" >> $GITHUB_ENV
              ;;
            oneplus_13)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13_b" >> $GITHUB_ENV
              ;;
            oneplus_ace_6)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_ace_6" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            oneplus_13t)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_oneplus_13t" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_13t_b" >> $GITHUB_ENV
              ;;
            oneplus_pad_2)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_pad_2" >> $GITHUB_ENV
              echo "IMAGENAME=Image_Op_Pad_2" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_pad2_mt6991_b" >> $GITHUB_ENV
              ;;
            oneplus_pad_2_pro)
              echo "REPO_MANIFEST=sm8750_b_16.0.0_pad_2_pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_pad_2_pro_b" >> $GITHUB_ENV
              ;;
            oneplus_ace5_ultra)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> $GITHUB_ENV
              ;;
            realme_GT7)
              echo "REPO_MANIFEST=mt6991_b_16.0.0_oneplus_ace5_ultra" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace5_ultra_b" >> $GITHUB_ENV
              ;;
            realme_GT7pro)
              echo "IMAGENAME=Image_Rm_GT_7_Pro" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            realme_GT7pro_Speed)
              echo "IMAGENAME=Image_Rm_GT_7_Pro_Speed" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
              ;;
            realme_GT8)
              echo "IMAGENAME=Image_Rm_GT_8" >> $GITHUB_ENV
              echo "SCHED_FILE=oneplus_ace_6" >> $GITHUB_ENV
          esac
          if [ -z "${{ github.event.inputs.custom_kernel_suffix }}" ]; then
            case "${{ env.DEVICES_NAME }}" in
             oneplus_pad_2_pro)
                DEFAULT_SUFFIX='-android15-8-g2e6b9c3812c5-ab15114928-4k'
              ;;
            oneplus_ace5_ultra)
                DEFAULT_SUFFIX='-android15-8-ge58033dc8ea6-abogki498046332-4k'
              ;;
            oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | oneplus_pad_2 | realme_GT7 | realme_GT7pro_Speed | realme_GT8)
                DEFAULT_SUFFIX='-android15-8-g93e223c276e7-abogki500782043-4k'
              ;;
            realme_GT7pro)
                DEFAULT_SUFFIX='-android15-8-gf4dc45704e54-abogki446052083-4k'
              ;;
          esac
            echo "DEFAULT_SUFFIX=$DEFAULT_SUFFIX" >> $GITHUB_ENV
            echo "使用原官核名称：$DEFAULT_SUFFIX"
          else
              # 验证用户输入是否以 - 开头
              if [[ "${{ github.event.inputs.custom_kernel_suffix }}" != -* ]]; then
                echo "::warning::自定义内核名称请以 - 开头"
                echo "示例：-android15-8-g096cdb6ecefc-ab14358676-4k"
              fi
            echo "使用自定义名称: ${{ github.event.inputs.custom_kernel_suffix }}"
            echo "DEFAULT_SUFFIX=${{ github.event.inputs.custom_kernel_suffix }}" >> $GITHUB_ENV
          fi
          if [ -z "${{ github.event.inputs.custom_kernel_time }}" ]; then
            case "${{ env.DEVICES_NAME }}" in
              oneplus_pad_2_pro)
                  KERNEL_TIME='Mon Mar 30 10:41:25 UTC 2026'
                ;;
              oneplus_ace5_ultra)
                  KERNEL_TIME='Sun Mar 29 12:31:26 UTC 2026'
                ;;
              oneplus_13 | oneplus_13t | oneplus_ace5_pro | oneplus_ace_6 | oneplus_pad_2 |realme_GT7 | realme_GT7pro_Speed | realme_GT8)
                  KERNEL_TIME='Wed Apr  8 15:08:30 UTC 2026'
                ;;
              realme_GT7pro)
                  KERNEL_TIME='Fri Sep 19 06:13:40 UTC 2025'
                ;;
            esac
            echo "KERNEL_TIME=$KERNEL_TIME" >> $GITHUB_ENV
            echo "使用官核时间：$KERNEL_TIME"
          else
            echo "使用自定义构建时间: ${{ github.event.inputs.custom_kernel_time }}"
            echo "KERNEL_TIME=${{ github.event.inputs.custom_kernel_time }}" >> $GITHUB_ENV
          fi

      - name: 🛠 Install dependencies and Initialize repo and sync （安装环境依赖+初始化源码仓库及工具链）
        run: |
          rm -rf kernel_workspace
          mkdir kernel_workspace
          cd kernel_workspace
          sudo apt-mark hold firefox &&
          sudo apt-mark hold libc-bin &&
          sudo apt purge man-db &&
          sudo rm -rf /var/lib/man-db/auto-update &&
          sudo apt update &&
          sudo apt-get install -y --no-install-recommends binutils python-is-python3 libssl-dev libelf-dev dos2unix p7zip-full zstd &
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/ccache-x86-64 -O ccache &&
          sudo cp -f ./ccache /usr/bin/ccache &&
          sudo chmod +x /usr/bin/ccache &&
          rm -f ./ccache &
          echo "正在克隆源码仓库..."
          if [ "${DEVICES_NAME}" = "realme_GT7pro" ] || [ "${DEVICES_NAME}" = "realme_GT7pro_Speed" ] || [ "${DEVICES_NAME}" = "realme_GT8" ]; then
            aria2c -s16 -x16 -k1M https://github.com/realme-kernel-opensource/realme_GT8-AndroidB-common-source/archive/refs/heads/master.zip -o common.zip
            unzip -q common.zip && 
            mv "realme_GT8-AndroidB-common-source-master" common
          elif [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ] || [ "${DEVICES_NAME}" = "oneplus_pad_2" ]; then
            aria2c -s16 -x16 -k1M https://github.com/OnePlusOSS/android_kernel_oneplus_mt6991/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip
            unzip -q common.zip && 
            mv "android_kernel_oneplus_mt6991-oneplus-${REPO_MANIFEST}" common
          else
            aria2c -s16 -x16 -k1M https://github.com/OnePlusOSS/android_kernel_common_oneplus_sm8750/archive/refs/heads/oneplus/${REPO_MANIFEST}.zip -o common.zip
            unzip -q common.zip && 
            mv "android_kernel_common_oneplus_sm8750-oneplus-${REPO_MANIFEST}" common
          fi
          rm -rf common.zip 
          echo "正在克隆 llvm-clang18 工具链..."
          mkdir -p clang18 &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/clang-r510928.zip -o clang.zip &&
          unzip -q clang.zip -d clang18 &&
          rm -rf clang.zip &
          echo "正在克隆构建工具..." &&
          aria2c -s16 -x16 -k1M https://github.com/cctv18/oneplus_sm8650_toolchain/releases/download/LLVM-Clang18-r510928/build-tools.zip -o build-tools.zip &&
          unzip -q build-tools.zip &&
          rm -rf build-tools.zip &
          wait
          echo "所有源码及 llvm-Clang18 工具链初始化完成！"
          echo "正在去除 ABI 保护 & 去除 dirty 后缀..."
          rm common/android/abi_gki_protected_exports_* || true
          for f in common/scripts/setlocalversion; do
            sed -i 's/ -dirty//g' "$f"
            sed -i '$i res=$(echo "$res" | sed '\''s/-dirty//g'\'')' "$f"
          done
          
      - name: 🛠 Set ccache DIR(配置 ccache 目录)
        run: |
          echo "CCACHE_DIR=$HOME/.ccache_${{ env.DEVICES_NAME }}" >> $GITHUB_ENV
          echo "CCACHE_MAXSIZE=10G" >> $GITHUB_ENV
          # 根据影响源码的功能开关生成缓存变体后缀，避免不同变体互相污染
          CACHE_VARIANT=""
          if [ "${{ env.ENABLE_DROIDSPACES }}" = "true" ]; then
            CACHE_VARIANT="${CACHE_VARIANT}-ds"
          fi
          echo "CACHE_VARIANT=$CACHE_VARIANT" >> $GITHUB_ENV
          echo "当前构建内核机型：${{ env.DEVICES_NAME }}，缓存变体：${CACHE_VARIANT:-(无)}"
          echo "当前磁盘空间："
          df -h

      - name: 📥 Restore ccache (载入当前机型的 ccache 缓存)
        id: ccache-restore
        uses: actions/cache/restore@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.DEVICES_NAME }}${{ env.CACHE_VARIANT }}-latest
          restore-keys: |
            ccache-${{ env.DEVICES_NAME }}${{ env.CACHE_VARIANT }}-
            ccache-${{ env.DEVICES_NAME }}-

      - name: 🔎 Find public ccache in releases (查找公共缓存)
        id: public-ccache
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/github-script@v8
        env:
          PUBLIC_CACHE_REPO: ${{ vars.PUBLIC_CACHE_REPO }}
          PUBLIC_CACHE_TAG: ${{ vars.PUBLIC_CACHE_TAG }}
          DEVICE_NAME: ${{ env.DEVICES_NAME }}
          CACHE_VARIANT: ${{ env.CACHE_VARIANT }}
        with:
          script: |
            const repoName = process.env.PUBLIC_CACHE_REPO || 'showdo/Public_Ccache';
            const releaseTag = process.env.PUBLIC_CACHE_TAG || 'exported-ccaches';
            const [owner, repo] = repoName.split('/');
            const deviceName = process.env.DEVICE_NAME;
            const cacheVariant = process.env.CACHE_VARIANT || '';
            let selected = null;

            const escape_regex = (value) => value.replace(/[.*+?^${}()|[\\]\\]/g, '\\$&');
            // 优先精确匹配带变体的资产，其次匹配不带变体的
            const variantExactName = `ccache-${deviceName}${cacheVariant}.tar.zst`;
            const plainExactName = `ccache-${deviceName}.tar.zst`;
            // 有变体时仅匹配变体缓存，不降级到非变体（不同变体的缓存无法互相命中）
            const priorityAssets = cacheVariant ? [variantExactName] : [plainExactName];
            const legacyAssetPattern = new RegExp(`^ccache-(.+-)?${escape_regex(deviceName)}(-[0-9]+)?\\.tar\\.zst$`);

            core.info(`当前仓库无匹配 ccache，开始按机型查找公共缓存：${deviceName}`);
            core.info(`缓存变体：${cacheVariant || '(无)'}`);
            core.info(`缓存来源仓库：${owner}/${repo}`);
            core.info(`缓存来源标签：${releaseTag}`);
            core.info(`优先匹配公共缓存文件：${priorityAssets.join(', ')}`);

            let release;
            try {
              const response = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag: releaseTag,
              });
              release = response.data;
            } catch (error) {
              core.info(`未找到公共缓存 release: ${releaseTag}`);
              return;
            }

            for (const asset of release.assets || []) {
              const priorityIndex = priorityAssets.indexOf(asset.name);
              const isExactMatch = priorityIndex !== -1;
              const isLegacyMatch = legacyAssetPattern.test(asset.name);
              if (isExactMatch || isLegacyMatch) {
                // 带变体的精确匹配优先级最高（priorityIndex=0），其次不带变体（priorityIndex=1），最后是 legacy
                const shouldReplace =
                  !selected ||
                  (isExactMatch && (!selected.exact || priorityIndex < (selected.priority ?? 99))) ||
                  (isExactMatch && !selected.exact) ||
                  (!isExactMatch && !selected.exact && new Date(asset.updated_at) > new Date(selected.updated_at));

                if (shouldReplace) {
                  selected = {
                    name: asset.name,
                    updated_at: asset.updated_at,
                    tag: release.tag_name,
                    repo: `${owner}/${repo}`,
                    exact: isExactMatch,
                    priority: isExactMatch ? priorityIndex : 99,
                  };
                }
              }
            }

            if (!selected) {
              core.info('未找到可用的公共 ccache 资产，将使用空缓存继续构建');
              return;
            }

            core.info(`找到公共缓存：${selected.name} (${selected.repo}@${selected.tag})`);
            core.setOutput('asset-name', selected.name);
            core.setOutput('release-tag', selected.tag);
            core.setOutput('source-repo', selected.repo);

      - name: 📦 Restore public ccache from releases (恢复公共缓存)
        if: ${{ steps.ccache-restore.outputs.cache-matched-key == '' && steps.public-ccache.outputs.asset-name != '' }}
        env:
          GH_TOKEN: ${{ github.token }}
          PUBLIC_CACHE_REPO: ${{ steps.public-ccache.outputs.source-repo }}
          PUBLIC_CACHE_TAG: ${{ steps.public-ccache.outputs.release-tag }}
          PUBLIC_CACHE_ASSET: ${{ steps.public-ccache.outputs.asset-name }}
        run: |
          set -euo pipefail
          echo "当前仓库无匹配缓存，开始下载公共缓存：$PUBLIC_CACHE_ASSET"
          rm -f "$PUBLIC_CACHE_ASSET"
          rm -rf "$CCACHE_DIR"
          gh release download "$PUBLIC_CACHE_TAG" --repo "$PUBLIC_CACHE_REPO" --pattern "$PUBLIC_CACHE_ASSET" --dir .
          TEMP_EXTRACT_DIR="$(mktemp -d)"
          tar --use-compress-program=unzstd -xf "$PUBLIC_CACHE_ASSET" -C "$TEMP_EXTRACT_DIR"
          EXTRACTED_CCACHE_DIR="$(find "$TEMP_EXTRACT_DIR" -maxdepth 1 -mindepth 1 -type d -name '.ccache_*' | head -n 1)"
          if [ -z "$EXTRACTED_CCACHE_DIR" ]; then
            echo "::error::公共缓存解压后未找到 .ccache_* 目录"
            exit 1
          fi

          mkdir -p "$CCACHE_DIR"
          shopt -s dotglob nullglob
          mv "$EXTRACTED_CCACHE_DIR"/* "$CCACHE_DIR"/
          shopt -u dotglob nullglob
          rm -rf "$TEMP_EXTRACT_DIR"
          test -d "$CCACHE_DIR"
          ls -lah "$CCACHE_DIR" | head -n 20
          echo "PUBLIC_CCACHE_USED=true" >> "$GITHUB_ENV"
          echo "公共缓存恢复完成：$CCACHE_DIR"
      
      - name: 📥 Init ccache (初始化配置 ccache)
        run: |
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          
          mkdir -p "$CCACHE_DIR"
          
          echo "配置 ccache 缓存大小为：$CCACHE_MAXSIZE"
          ccache -M "$CCACHE_MAXSIZE"
          ccache -o compression=true
          
          echo "ccache 初始状态:"
          ccache -s
          
          if [ -n "${{ steps.ccache-restore.outputs.cache-matched-key }}" ]; then
            echo "ccache 缓存命中详情：${{ steps.ccache-restore.outputs.cache-matched-key }}"
            ccache -sv
          elif [ "${PUBLIC_CCACHE_USED:-false}" = 'true' ]; then
            echo "已恢复公共 ccache，当前缓存详情:"
            ccache -sv
          else
            echo "未命中仓库缓存，也未找到公共缓存，将从空缓存开始构建"
          fi

      - name: 🔧 Apply Sched Patch (应用完美风驰补丁)
        run: |
          if [ "$SCHED_FILE" = "none" ]; then
            echo "该机型自带风驰，跳过所有补丁应用"
          else
            cd kernel_workspace/common
            if [ "${DEVICES_NAME}" = "oneplus_ace5_ultra" ] || [ "${DEVICES_NAME}" = "realme_GT7" ] || [ "${DEVICES_NAME}" = "oneplus_pad_2" ]; then
              git clone https://github.com/Numbersf/SCHED_PATCH.git -b "mt6991"
            else
              git clone https://github.com/Numbersf/SCHED_PATCH.git -b "sm8750"
            fi
            echo "正在拉取风驰补丁"
            cp ./SCHED_PATCH/fengchi_${{env.SCHED_FILE}}.patch ./
            if [[ -f "fengchi_${{env.SCHED_FILE}}.patch" ]]; then
              echo "开始应用风驰补丁"
              dos2unix "fengchi_${{env.SCHED_FILE}}.patch"
              patch -p1 -F 3 < "fengchi_${{env.SCHED_FILE}}.patch"
              echo "完美风驰补丁应用完成"
            else
              echo "❌ 未匹配到补丁，风驰补丁暂未支持该机型"
              exit 11
            fi
          else
            echo "未启用风驰，则需应用OGKI转换GKI补丁"
            cd kernel_workspace/common
            sed -i '1iobj-y += hmbird_patch.o' drivers/Makefile
            cp "${GITHUB_WORKSPACE}/patch/hmbird_patch.patch" ./hmbird_patch.patch
            echo "正在打OGKI转换GKI补丁"
            patch -p1 -F 3 < hmbird_patch.patch
            echo "OGKI转换GKI_patch完成"
          fi

      - name: 🔧 Add Re-Kernel Support (添加 Re-Kernel 支持)
        if: ${{ env.ENABLE_REKERNEL == 'true' }}
        run: |
            cd kernel_workspace
            VERSION=$(awk -F'=' '/^VERSION[ \t]*=/ {gsub(/ /,"",$2); print $2}' common/Makefile)
            PATCHLEVEL=$(awk -F'=' '/^PATCHLEVEL[ \t]*=/ {gsub(/ /,"",$2); print $2}' common/Makefile)
            echo "内核版本: ${VERSION}.${PATCHLEVEL}"
            [ ! -d "Re-Kernel" ] && git clone --depth 1 https://github.com/Sakion-Team/Re-Kernel.git
            RE_DIR="${GITHUB_WORKSPACE}/kernel_workspace/Re-Kernel/LKM-Source"
            cd common
            grep -q 'source "drivers/rekernel/Kconfig"' drivers/Kconfig || \
              sed -i '/endmenu/i source "drivers/rekernel/Kconfig"' drivers/Kconfig
            grep -q 'obj-$(CONFIG_REKERNEL)' drivers/Makefile || \
              printf '\n# Re-Kernel\nobj-$(CONFIG_REKERNEL) += rekernel/\n' >> drivers/Makefile
            mkdir -p drivers/rekernel
            cp ${RE_DIR}/* drivers/rekernel/
            TARGET="KERNEL_${VERSION}_${PATCHLEVEL}"
            if grep -q "$TARGET" drivers/rekernel/rekernel.h; then
              sed -i "s|^[[:space:]]*//[[:space:]]*#define[[:space:]]\+$TARGET|#define $TARGET|" drivers/rekernel/rekernel.h
              echo "CONFIG_REKERNEL=m" >> arch/arm64/configs/gki_defconfig
              echo "CONFIG_REKERNEL_NETWORK=y" >> arch/arm64/configs/gki_defconfig
              echo "✅ Re-Kernel 配置完成"
            else
              echo "⚠️ 不支持的内核版本: $TARGET"
            fi
          
      - name: 🔧 Add adios_ioscheduler (添加 adios_ioscheduler 支持)
        if: ${{ env.ENABLE_ADIOS == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          echo "开始添加 ADIOS I/O 调度器支持..."
          PATCH_FILE="${GITHUB_WORKSPACE}/patch/adios_ioscheduler_6.6.patch"
          if [ ! -f "$PATCH_FILE" ]; then
            echo "::error::未找到 ADIOS I/O 调度器补丁文件"
            exit 1
          fi
          if [ -f "block/adios.c" ]; then
            echo "✓ ADIOS I/O 调度器文件已存在，跳过应用补丁"
          else
            cp "$PATCH_FILE" ./adios_ioscheduler_6.6.patch
            echo "正在应用 ADIOS I/O 调度器补丁..."
            if patch -p1 --ignore-whitespace -F 3 < adios_ioscheduler_6.6.patch 2>&1 | tee /tmp/adios_patch.log; then
              echo "✓ ADIOS I/O 调度器补丁应用成功"
            else
              echo "::warning::ADIOS 补丁应用出现问题"
              if grep -q "malformed patch" /tmp/adios_patch.log; then
                patch -p1 --force --ignore-whitespace < adios_ioscheduler_6.6.patch || true
              fi
            fi
            rm -f adios_ioscheduler_6.6.patch
          fi
          if ! grep -q "CONFIG_MQ_IOSCHED_ADIOS" arch/arm64/configs/gki_defconfig; then
            echo "CONFIG_MQ_IOSCHED_ADIOS=y" >> arch/arm64/configs/gki_defconfig
            echo "CONFIG_MQ_IOSCHED_DEFAULT_ADIOS=y" >> arch/arm64/configs/gki_defconfig
            echo "✓ 已启用 ADIOS I/O 调度器支持"
          fi
          echo "✓ ADIOS I/O 调度器支持配置完成"
          
      - name: 🔧 apply lz4 1.10.0 & zstd 1.5.7 patches (添加lz4 1.10.0 & zstd 1.5.7补丁)
        run: |
          echo "正在添加lz4 1.10.0 & zstd 1.5.7补丁…"
          cd kernel_workspace
          git clone https://github.com/cctv18/oppo_oplus_realme_sm8750.git
          cp ./oppo_oplus_realme_sm8750/zram_patch/001-lz4.patch ./common
          cp ./oppo_oplus_realme_sm8750/zram_patch/lz4armv8.S ./common/lib
          cp ./oppo_oplus_realme_sm8750/zram_patch/002-zstd.patch ./common/
          cd ./common
          git apply -p1 < 001-lz4.patch || true
          patch -p1 < 002-zstd.patch || true
          
      - name: 🔧 Set Baseband-guard (开启 BBG 基带守护)
        if: ${{ env.ENABLE_BBG == 'true' }}
        run: |
          cd kernel_workspace/common
          echo "正在启用 BBG 基带守护…"
          curl -LSs https://raw.githubusercontent.com/vc-teahouse/Baseband-guard/main/setup.sh | bash
          sed -i '/^config LSM$/,/^help$/{ /^[[:space:]]*default/ { /baseband_guard/! s/lockdown/lockdown,baseband_guard/ } }' ./security/Kconfig

          
      - name: ⚙️ Set ReSukiSU (设置ReSukiSU)
        if: ${{ env.ENABLE_KSU == 'true' }}
        id: ksu_step
        run: |
          cd kernel_workspace
          echo "正在配置ReSukiSU..."
          curl -LSs "https://raw.githubusercontent.com/ReSukiSU/ReSukiSU/refs/heads/main/kernel/setup.sh" | bash -s main
          cd ./KernelSU 
          KSU_VERSION=$(expr $(git rev-list --count main) + 30700 2>/dev/null || echo 114514)
          echo "KSUVER=$KSU_VERSION" >> $GITHUB_ENV
          echo "ksuver=$KSU_VERSION" >> $GITHUB_OUTPUT
          
            
      - name: 🔧 Set up SUSFS (配置 SUSFS)
        if: ${{ env.ENABLE_SUSFS == 'true' && env.ENABLE_KSU == 'true' }}
        run: |
          cd kernel_workspace
          git clone --depth=1 https://github.com/cctv18/susfs4oki.git susfs4ksu -b oki-android15-6.6
          wget https://raw.githubusercontent.com/cctv18/oppo_oplus_realme_sm8750/main/other_patch/69_hide_stuff.patch -O ./common/69_hide_stuff.patch
          cp ./susfs4ksu/kernel_patches/50_add_susfs_in_gki-android15-6.6.patch ./common/
          cp ./susfs4ksu/kernel_patches/fs/* ./common/fs/
          cp ./susfs4ksu/kernel_patches/include/linux/* ./common/include/linux/
          cd ./common
          patch -p1 < 50_add_susfs_in_gki-android15-6.6.patch || true
          patch -p1 -N -F 3 < 69_hide_stuff.patch || true
          echo "[OK] SUSFS 补丁处理流程全部完成"
          
      - name: 🔧 Add Droidspaces Support (添加 Droidspaces 支持)
        if: ${{ env.ENABLE_DROIDSPACES == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          echo "==> 开始添加 Droidspaces 支持"
          patch_file="Droidspaces_6.6.patch"
          patch_path="${GITHUB_WORKSPACE}/patch/${patch_file}"
          
          if [ ! -f "$patch_path" ]; then
            echo "::error::Patch 不存在: $patch_path"
            exit 1
          fi
          
          echo "==> 正在应用: $patch_file"
          if patch -p1 --forward < "$patch_path"; then
            echo "==> Patch 应用成功: $patch_file"
          else
            echo "::error::Patch 应用失败: $patch_file"
            exit 1
          fi
          echo "==> Droidspaces patch 添加完成"

      - name: 🔧 Apply ntsync Patch (应用 ntsync 补丁)
        if: ${{ env.ENABLE_DROIDSPACES == 'true' }}
        working-directory: kernel_workspace/common
        run: |
          echo "==> 开始应用 ntsync 补丁..."
          for PATCH_NAME in "ntsync_base.patch" "ntsync_compat_6.6.patch"; do
            PATCH_PATH="${GITHUB_WORKSPACE}/patch/${PATCH_NAME}"
            if [ ! -f "$PATCH_PATH" ]; then
              echo "::error::未找到 ntsync 补丁: $PATCH_PATH"
              exit 1
            fi
            echo "  应用: $PATCH_NAME"
            dos2unix "$PATCH_PATH"
            if ! git apply --ignore-whitespace "$PATCH_PATH"; then
              echo "::warning::补丁 $PATCH_NAME 应用失败，可能已应用或上下文不匹配"
            fi
          done
          echo "==> ntsync 补丁应用完成"

      - name: 🔧 Set gki_defconfig (设置编译配置) 
        run: |
          cd kernel_workspace
          
          if [ "${{ env.ENABLE_KSU }}" = "true" ]; then
            echo "CONFIG_KSU=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_KPM=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo 'CONFIG_KSU_FULL_NAME_FORMAT="%TAG_NAME%-%COMMIT_SHA%-Re-TG@qdykernel"' >> ./common/arch/arm64/configs/gki_defconfig
            
            if [ "${{ env.ENABLE_SUSFS }}" == 'true' ];then
              echo "CONFIG_KSU_SUSFS=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_HAS_MAGIC_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_SUS_PATH=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_SUS_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_KSU_DEFAULT_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_SUS_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_SUS_KSTAT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_TRY_UMOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_AUTO_ADD_TRY_UMOUNT_FOR_BIND_MOUNT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_SPOOF_UNAME=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_ENABLE_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_HIDE_KSU_SUSFS_SYMBOLS=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_SPOOF_CMDLINE_OR_BOOTCONFIG=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_OPEN_REDIRECT=y" >> ./common/arch/arm64/configs/gki_defconfig
              echo "CONFIG_KSU_SUSFS_SUS_MAP=y" >> ./common/arch/arm64/configs/gki_defconfig
            else
              echo "未启用SUSFS 跳过SUSFS配置"
            fi
          else
            echo "未启用KSU，将不会集成Root及SUSFS"
          fi
          if [ "${{ env.ENABLE_DROIDSPACES }}" == 'true' ];then
            echo "应用Droidspaces推荐配置"
            echo "CONFIG_SYSVIPC=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_POSIX_MQUEUE=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_IPC_NS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_PID_NS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_DEVTMPFS=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_MATCH_ADDRTYPE=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_TARGET_REJECT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_TARGET_LOG=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_MATCH_RECENT=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_IP_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_IP_SET_HASH_IP=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_IP_SET_HASH_NET=y" >> ./common/arch/arm64/configs/gki_defconfig
            echo "CONFIG_NETFILTER_XT_SET=y" >> ./common/arch/arm64/configs/gki_defconfig
            # ntsync 驱动 (Droidspaces 配套组件)
            echo "CONFIG_NTSYNC=y" >> ./common/arch/arm64/configs/gki_defconfig
          fi
          echo "CONFIG_TMPFS_XATTR=y" >> ./common/arch/arm64/configs/gki_defconfig
          echo "CONFIG_TMPFS_POSIX_ACL=y" >> ./common/arch/arm64/configs/gki_defconfig

          echo "CONFIG_CC_OPTIMIZE_FOR_PERFORMANCE=y" >> ./common/arch/arm64/configs/gki_defconfig
          
          #Remove check_defconfig
          sudo sed -i 's/check_defconfig//' ./common/build.config.gki

      - name: 🔧 Set Kernel name (设置内核名称)
        run: |
          cd kernel_workspace
          echo "内核后缀：$DEFAULT_SUFFIX"
          ESCAPED_SUFFIX=$(printf '%s\n' "$DEFAULT_SUFFIX" | sed 's:[\/&]:\\&:g')
          sudo sed -i "s/-4k/$ESCAPED_SUFFIX/g" ./common/arch/arm64/configs/gki_defconfig
          sed -i 's/${scm_version}//' ./common/scripts/setlocalversion

      - name: 📥 Start build timer (构建计时开始)
        run: 
          echo "BUILD_START=$(date +%s)" >> $GITHUB_ENV


      - name: 🔨 Build Kernel (构建内核)
        run: |
          WORKDIR="$(pwd)"
          export PATH="/usr/lib/ccache:$PATH"
          export PATH="$WORKDIR/kernel_workspace/clang18/bin:$PATH"
          export PATH="$WORKDIR/kernel_workspace/build-tools/bin:$PATH"
          CLANG_DIR="$WORKDIR/kernel_workspace/clang18/bin"
          CLANG_VERSION="$($CLANG_DIR/clang --version | head -n 1)"
          LLD_VERSION="$($CLANG_DIR/ld.lld --version | head -n 1)"
          pahole_version=$(pahole --version 2>/dev/null | head -n1); [ -z "$pahole_version" ] && echo "pahole 版本：未安装" || echo "pahole 版本：$pahole_version"
          export CCACHE_LOGFILE="${{ github.workspace }}/kernel_workspace/ccache.log"
          export CCACHE_COMPILERCHECK="none"
          export CCACHE_BASEDIR="${{ github.workspace }}"
          export CCACHE_NOHASHDIR="true"
          export CCACHE_NOHARDLINK="true"
          export CCACHE_DIR="${{ env.CCACHE_DIR }}"
          export CCACHE_MAXSIZE="${{ env.CCACHE_MAXSIZE }}"
          export CCACHE_IS_KERNEL_COMPILING="true"
          echo "sloppiness = file_stat_matches,include_file_ctime,include_file_mtime,pch_defines,file_macro,time_macros" >> "$CCACHE_DIR/ccache.conf"
          cd kernel_workspace/common
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfakestat.so
          wget https://github.com/cctv18/oppo_oplus_realme_sm8750/raw/refs/heads/main/lib/libfaketimeMT.so
          chmod 777 ./*.so
          export FAKESTAT="2025-05-25 12:00:00"
          export FAKETIME="@2025-05-25 13:00:00"
          echo "FAKESTAT=$FAKESTAT" >> $GITHUB_ENV
          echo "FAKETIME=$FAKETIME" >> $GITHUB_ENV
          SO_DIR=$(pwd)
          export PRELOAD_LIBS="$SO_DIR/libfakestat.so $SO_DIR/libfaketimeMT.so"
          echo '#!/bin/bash' > cc-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> cc-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> cc-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> cc-wrapper
          echo 'ccache clang "$@"' >> cc-wrapper
          echo '#!/bin/bash' > ld-wrapper
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> ld-wrapper
          echo 'export FAKESTAT="'$FAKESTAT'"' >> ld-wrapper
          echo 'export FAKETIME="'$FAKETIME'"' >> ld-wrapper
          echo 'ld.lld "$@"' >> ld-wrapper
          echo '#!/bin/bash' > test-wrapper.sh
          echo 'export LD_PRELOAD="'$PRELOAD_LIBS'"' >> test-wrapper.sh
          echo 'export FAKESTAT="'$FAKESTAT'"' >> test-wrapper.sh
          echo 'export FAKETIME="'$FAKETIME'"' >> test-wrapper.sh
          echo 'echo ">>> Wrapper 内部环境检查完毕."' >> test-wrapper.sh
          echo 'exec "$@"' >> test-wrapper.sh
          chmod +x test-wrapper.sh
          ./test-wrapper.sh date
          ./test-wrapper.sh stat ./Makefile
          chmod +x cc-wrapper ld-wrapper
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          export KBUILD_BUILD_TIMESTAMP="${KERNEL_TIME}"
          sudo rm -rf /usr/share/dotnet &
          sudo rm -rf /usr/local/lib/android &
          sudo rm -rf /opt/ghc &
          sudo rm -rf /opt/hostedtoolcache/CodeQL &
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="ccache clang" LD="ld.lld" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error gki_defconfig &&
          make -j$(nproc --all) LLVM=1 ARCH=arm64 CROSS_COMPILE=aarch64-linux-gnu- CC="$(pwd)/cc-wrapper" LD="$(pwd)/ld-wrapper" HOSTLD=ld.lld O=out KCFLAGS+=-O2 KCFLAGS+=-Wno-error Image
          LD_PRELOAD=$PRELOAD_LIBS stat ./Makefile
          echo "ccache 状态："
          ccache -s
      
      - name: 🕒 Calculate build time (计算构建时间)
        run: |
          END=$(date +%s)
          TIME=$((END - BUILD_START))
          echo "BUILD_TIME=$TIME" >> $GITHUB_ENV
          echo "Build time: $TIME seconds"

      - name: 📥 Save ccache if needed (构建时间较长或首次落地本地缓存时保存)
        if: ${{ env.BUILD_TIME > 480 || steps.ccache-restore.outputs.cache-matched-key == '' }}
        uses: actions/cache/save@v5
        with:
          path: ${{ env.CCACHE_DIR }}
          key: ccache-${{ env.DEVICES_NAME }}${{ env.CACHE_VARIANT }}-${{ github.run_id }}

      - name: 🧹 Clean old ccache (清理旧缓存)
        if: env.BUILD_TIME > 480
        uses: actions/github-script@v8
        env:
          PREFIX: ccache-${{ env.DEVICES_NAME }}${{ env.CACHE_VARIANT }}-
          CURRENT_KEY: ccache-${{ env.DEVICES_NAME }}${{ env.CACHE_VARIANT }}-${{ github.run_id }}
        with:
          script: |
            const { owner, repo } = context.repo;
            const prefix = process.env.PREFIX;
            const currentKey = process.env.CURRENT_KEY;
            let page = 1;
            let deleted = 0;

            core.info('构建时间超过 8 分钟，已保存 ccache 缓存');
            core.info(`正在清理旧缓存，匹配前缀：${prefix}`);

            while (true) {
              const response = await github.rest.actions.getActionsCacheList({
                owner,
                repo,
                per_page: 100,
                page,
              });

              const caches = response.data.actions_caches || [];
              if (caches.length === 0) {
                break;
              }

              for (const cache of caches) {
                if (cache.key.startsWith(prefix) && cache.key !== currentKey) {
                  core.info(`Deleting cache: ${cache.key} (ID: ${cache.id})`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner,
                    repo,
                    cache_id: cache.id,
                  });
                  deleted++;
                }
              }
              if (caches.length < 100) {
                break;
              }
              page++;
            }

            core.info(`旧缓存清理完成，共删除 ${deleted} 个缓存`);

      - name: 📦 Make AnyKernel3 (创建Anykernel3)
        run: |
          cp "${GITHUB_WORKSPACE}/.github/workflows/tools/main.bin" ./
          chmod +x main.bin
          ./main.bin "make_anykernel3"
          rm -rf ./main.bin
          
      - name: 📤 Upload AnyKernel3 (上传 Anykernel3)
        uses: actions/upload-artifact@v6
        with:
         name: AK3_${{ env.KSUVER }}_${{ env.DEVICES_NAME }}_ReSukiSU
         path: ./AnyKernel3/*

  upload_rekernel:
    name: Upload Re-Kernel Module
    if: ${{ github.event.inputs.enable_ReKernel == 'true' }}
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: 🔎 Find Re-Kernel module zip (查找Re-Kernel最新模块并下载)
        id: download-rekernel
        uses: actions/github-script@v8
        env:
          KERNEL_MAJOR: "6.6"
        with:
          script: |
            const owner = 'Sakion-Team';
            const repo = 'Re-Kernel';
            const kernelMajor = process.env.KERNEL_MAJOR;

            core.info(`正在获取 ${owner}/${repo} 的最新 release...`);

            const release = await github.rest.repos.getLatestRelease({
              owner,
              repo,
            });
            core.info(`最新版本: ${release.data.tag_name}`);
            const escapedKernel = kernelMajor.replace(/\./g, '\\.');
            const pattern66 = new RegExp(`^Re-Kernel-v([\\d.]+)-${escapedKernel}\\.zip$`);
            const patternAny = new RegExp(`^Re-Kernel.*\\.zip$`, 'i');

            let targetAsset = null;
            let versionNumber = '';
            let isExactMatch = false;

            for (const asset of release.data.assets || []) {
              const match = asset.name.match(pattern66);
              if (match) {
                targetAsset = asset;
                versionNumber = match[1];
                isExactMatch = true;
                core.info(`找到精确匹配 6.6: ${asset.name}`);
                break;
              }
            }

            if (!targetAsset) {
              core.info('未找到6.6版本，查找任意Re-Kernel模块...');
              for (const asset of release.data.assets || []) {
                const match = asset.name.match(patternAny);
                if (match) {
                  targetAsset = asset;
                  versionNumber = asset.name.replace(/Re-Kernel-v|.zip/gi, '').replace(/^-/, '').replace(/-$/, '') || 'latest';
                  isExactMatch = false;
                  core.info(`找到Re-Kernel模块: ${asset.name}`);
                  break;
                }
              }
            }

            if (!targetAsset) {
              core.setFailed('未找到任何 Re-Kernel 模块资产');
              return;
            }

            core.info(`找到目标资产: ${targetAsset.name} (版本: ${versionNumber}, ${(targetAsset.size / 1024).toFixed(1)} KB)`);
            core.setOutput('asset-name', targetAsset.name);
            core.setOutput('download-url', targetAsset.browser_download_url);
            core.setOutput('version-number', versionNumber);

      - name: 📥 Download Re-Kernel module (下载 Re-Kernel 模块)
        env:
          ASSET_NAME: ${{ steps.download-rekernel.outputs.asset-name }}
          DOWNLOAD_URL: ${{ steps.download-rekernel.outputs.download-url }}
          VERSION_NUMBER: ${{ steps.download-rekernel.outputs.version-number }}
        run: |
          set -euo pipefail
          ARTIFACT_NAME="Re-Kernel-v${VERSION_NUMBER}"
          echo "正在下载 Re-Kernel 模块: $ASSET_NAME"
          echo "下载地址: $DOWNLOAD_URL"
          echo "Artifact 名称: $ARTIFACT_NAME"
          aria2c -s16 -x16 -k1M "$DOWNLOAD_URL" -o "$ASSET_NAME"
          echo "✓ Re-Kernel 模块下载完成"
          ls -lh "$ASSET_NAME"
          echo "正在创建目录 $ARTIFACT_NAME 并解压模块..."
          mkdir -p "$ARTIFACT_NAME"
          unzip -q "$ASSET_NAME" -d "$ARTIFACT_NAME"
          echo "✓ 目录结构:"
          ls -lR "$ARTIFACT_NAME"

      - name: 📤 Upload Re-Kernel module (上传 Re-Kernel 模块)
        uses: actions/upload-artifact@v6
        with:
          name: Re-Kernel-v${{ steps.download-rekernel.outputs.version-number }}
          path: Re-Kernel-v${{ steps.download-rekernel.outputs.version-number }}

  release:
    name: 📤 Create Release (创建发布)
    needs: [build, upload_rekernel]
    if: ${{ github.event.inputs.enable_release == 'true' && always() && needs.build.result != 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - name: 📥 Download all artifacts (下载所有构建产物)
        uses: actions/download-artifact@v5
        with:
          pattern: "*"
          path: ./release_assets

      - name: 📦 Prepare release files (准备发布文件)
        run: |
          echo "=== 下载的产物列表 ==="
          ls -la ./release_assets/
          echo ""

          # 为每个 AK3 目录创建 zip 包
          for ak3_dir in ./release_assets/AK3_*/; do
            if [ -d "$ak3_dir" ]; then
              name=$(basename "$ak3_dir")
              echo "打包 AK3: $name"
              (cd "$ak3_dir" && zip -qr "../${name}.zip" .)
            fi
          done

          # 如果 Re-Kernel 模块存在，打包为 zip
          for rk_dir in ./release_assets/Re-Kernel-v*/; do
            if [ -d "$rk_dir" ]; then
              name=$(basename "$rk_dir")
              echo "打包 Re-Kernel: $name"
              (cd "$rk_dir" && zip -qr "../${name}.zip" .)
            fi
          done

          # 列出所有待上传的文件
          echo ""
          echo "=== 待上传到 Release 的文件 ==="
          find ./release_assets -maxdepth 1 -type f | sort

      - name: 🏷️ Create Release and Upload Assets (创建发布并上传)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # 时间戳
          TIME="$(TZ='Asia/Shanghai' date +'%y%m%d%H%M%S')"
          TIME_FORM="$(TZ='Asia/Shanghai' date +'%Y-%m-%d %H:%M:%S')"

          # 编译机型
          DEVICE_NAME="${{ github.event.inputs.device_name }}"

          # KSU 版本号（来自 build job 输出的 ksuver）
          KSU_VER="${{ needs.build.outputs.ksuver }}"

          # 功能配置描述
          FEATURES=""
          if [ "${{ github.event.inputs.enable_ReKernel }}" = "true" ]; then
            FEATURES="${FEATURES}- ✅ Re-Kernel 支持"$'\n'
          fi
          if [ "${{ github.event.inputs.enable_Adios }}" = "true" ]; then
            FEATURES="${FEATURES}- ✅ ADIOS IO调度器"$'\n'
          fi
          if [ "${{ github.event.inputs.enable_scx }}" = "true" ] || [ "${{ github.event.inputs.enable_droidspaces }}" = "true" ]; then
            FEATURES="${FEATURES}- ✅ 完美风驰 (SCX)"$'\n'
          fi
          if [ "${{ github.event.inputs.enable_bbg }}" = "true" ]; then
            FEATURES="${FEATURES}- ✅ BBG 基带守护"$'\n'
          fi
          if [ "${{ github.event.inputs.enable_droidspaces }}" = "true" ]; then
            FEATURES="${FEATURES}- ✅ Droidspaces 容器支持"$'\n'
          fi
          FEATURES="${FEATURES}- ✅ ReSukiSU (KernelSU)"$'\n'
          if [ "${{ github.event.inputs.enable_susfs }}" = "true" ]; then
            FEATURES="${FEATURES}- ✅ SUSFS 挂载支持"$'\n'
          fi

          # 自定义内核后缀
          KERNEL_SUFFIX="${{ github.event.inputs.custom_kernel_suffix }}"
          if [ -z "$KERNEL_SUFFIX" ]; then
            KERNEL_SUFFIX="默认官方"
          fi

          # 自定义构建时间
          KERNEL_TIME="${{ github.event.inputs.custom_kernel_time }}"
          if [ -z "$KERNEL_TIME" ]; then
            KERNEL_TIME="默认官方"
          fi

          # 生成 Release 说明
          cat << ENDOFF > release_notes.md
          ### 📱 SM8750 欧加真通用内核 | 构建信息

          - **内核版本**: SM8750 (Android 15 / 6.6)
          - **ReSukiSU 版本**: ${KSU_VER}
          - **编译时间**: ${TIME_FORM}
          - **编译机型**: ${DEVICE_NAME}
          - **内核后缀**: ${KERNEL_SUFFIX}
          - **构建时间**: ${KERNEL_TIME}
          - **仓库**: ${{ github.repository }}
          - **运行 ID**: ${{ github.run_id }}
          - **提交**: ${{ github.sha }}

          ### ⚙️ 功能配置

          ${FEATURES}
          ### ⏫️ 更新内容

          - 更新 ReSukiSU 至最新版本 (${KSU_VER})
          - 同步上游内核源码

          ### 📋 安装方法 | Installation Guide

          1. 若你已刷入 ReSukiSU 内核，且 ReSukiSU 管理器已更新至最新版本，可在管理器中直接刷入 AnyKernel 刷机包并重启；
          2. 由于 KernelSU 上游更新了元模块功能，最新版 KSU 管理器需要配合元模块 (metamodule) 才能正常挂载模块。目前的元模块包括 [meta overlayfs](https://github.com/KernelSU-Modules-Repo/meta-overlayfs), [mountify](https://github.com/backslashxx/mountify), [meta magicmount](https://github.com/7a72/meta-magic_mount/) 等。若你是第一次使用 KSU 或刚从旧版 KSU 管理器升级至新版，请先安装一个元模块；
          3. 若启用 Re-Kernel，需刷入配套Re-Kernel模块并配合 NoActive 软件使用，以提升后台冻结能力。

          #### 🔗 相关链接

          - ReSukiSU 管理器: [ReSukiSU_CI](https://github.com/cctv18/ReSukiSU_CI/releases)
          - SukiSU Ultra 管理器: [SukiSU-Ultra](https://github.com/SukiSU-Ultra/SukiSU-Ultra/releases)
          - KernelSU Next 管理器: [KernelSU-Next](https://github.com/KernelSU-Next/KernelSU-Next/releases)
          - KernelSU 原版管理器: [KernelSU](https://github.com/tiann/KernelSU/releases)
          - TG频道@qdykernel: [TG频道@qdykernel](https://t.me/qdykernel)

          #### ※※※ 刷写内核有风险，为防止出现意外导致手机变砖，在刷入内核前请务必用 [KernelFlasher](https://github.com/capntrips/KernelFlasher) 等软件备份 boot 等关键启动分区! ※※※
          ENDOFF

          echo "=== Release 说明 ==="
          cat release_notes.md
          echo ""

          # 收集所有待上传的文件（仅 AK3 zip 和 Re-Kernel zip）
          RELEASE_FILES=$(find ./release_assets -maxdepth 1 -type f \( -name 'AK3_*.zip' -o -name 'Re-Kernel-v*.zip' \) 2>/dev/null || true)

          if [ -z "$RELEASE_FILES" ]; then
            echo "::warning::没有找到待上传的发布文件"
            RELEASE_FILES=""
          fi

          echo "=== 创建 Release ==="
          TAG_NAME="SM8750-${DEVICE_NAME}-build-${TIME}"

          gh release create "${TAG_NAME}" \
            --repo "${{ github.repository }}" \
            --title "SM8750 ${DEVICE_NAME} Kernel Build - ${TIME_FORM}" \
            --notes-file release_notes.md \
            ${RELEASE_FILES}

          echo ""
          echo "✅ Release 创建完成: ${TAG_NAME}"